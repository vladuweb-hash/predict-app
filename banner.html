<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh">
<canvas id="c" width="640" height="360"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

const grad = ctx.createLinearGradient(0, 0, 640, 360);
grad.addColorStop(0, '#0f0f14');
grad.addColorStop(0.5, '#1a1a2e');
grad.addColorStop(1, '#16162a');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 640, 360);

const glow = ctx.createRadialGradient(320, 150, 0, 320, 150, 220);
glow.addColorStop(0, 'rgba(108,92,231,0.35)');
glow.addColorStop(1, 'rgba(108,92,231,0)');
ctx.fillStyle = glow;
ctx.fillRect(0, 0, 640, 360);

// Up trend line (green)
ctx.beginPath();
ctx.moveTo(200, 190); ctx.lineTo(270, 140); ctx.lineTo(320, 170); ctx.lineTo(400, 90);
ctx.strokeStyle = '#00b894'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
ctx.beginPath(); ctx.moveTo(400, 90); ctx.lineTo(385, 100); ctx.lineTo(393, 113); ctx.closePath();
ctx.fillStyle = '#00b894'; ctx.fill();

// Down trend line (red)
ctx.beginPath();
ctx.moveTo(240, 120); ctx.lineTo(290, 165); ctx.lineTo(330, 145); ctx.lineTo(380, 200);
ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 4; ctx.stroke();
ctx.beginPath(); ctx.moveTo(380, 200); ctx.lineTo(370, 188); ctx.lineTo(376, 182); ctx.closePath();
ctx.fillStyle = '#ff6b6b'; ctx.fill();

// Coins
[{x:110,y:75,r:14,c:'#f7931a',t:'₿'},{x:530,y:80,r:12,c:'#627eea',t:'Ξ'},{x:90,y:240,r:10,c:'#26a17b',t:'$'},{x:550,y:230,r:11,c:'#f0b90b',t:'B'}].forEach(ci => {
  ctx.beginPath(); ctx.arc(ci.x, ci.y, ci.r, 0, Math.PI*2);
  ctx.fillStyle = ci.c; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = `bold ${ci.r}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(ci.t, ci.x, ci.y);
});

// Title
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.fillStyle = '#ffffff'; ctx.font = 'bold 46px sans-serif';
ctx.shadowColor = 'rgba(108,92,231,0.6)'; ctx.shadowBlur = 20;
ctx.fillText('ПРЕДСКАЖИ', 320, 265);
ctx.shadowBlur = 0;

// Subtitle
ctx.fillStyle = '#8888aa'; ctx.font = '17px sans-serif';
ctx.fillText('Угадай движение цен · Крипта · Валюты · Золото', 320, 305);

// Stars
ctx.fillStyle = 'rgba(255,255,255,0.5)';
[{x:160,y:130},{x:460,y:110},{x:180,y:300},{x:480,y:290},{x:140,y:180},{x:500,y:170}].forEach(s => {
  ctx.beginPath(); ctx.arc(s.x, s.y, 1.5, 0, Math.PI*2); ctx.fill();
});

// Download
const link = document.createElement('a');
link.download = 'predict-banner-640x360.png';
link.href = c.toDataURL('image/png');
link.click();
document.body.innerHTML = '<div style="color:#fff;font-size:20px;text-align:center;padding:40px">Картинка скачана! (640×360)<br>Файл: predict-banner-640x360.png</div>' + '<br>' + '<img src="' + c.toDataURL() + '" style="border:1px solid #333">';
</script>
</body>
</html>
