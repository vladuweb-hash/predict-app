<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Предскажи</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f14;--bg2:#1a1a24;--bg3:#24243a;--card:#1e1e2e;
  --text:#e8e8f0;--text2:#8888aa;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00b894;--red:#ff6b6b;--gold:#ffd700;--blue:#0984e3;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
a{color:var(--accent2);text-decoration:none}

.app{display:flex;flex-direction:column;min-height:100vh}
.rating-strip{font-size:12px;text-align:center;padding:9px 12px 8px;background:linear-gradient(90deg,rgba(255,215,0,.18),rgba(108,92,231,.15));border-bottom:1px solid var(--bg3);color:var(--text);flex-shrink:0}
.rating-strip strong{color:var(--gold);font-size:15px;font-weight:800}
.content{flex:1;padding:16px;padding-bottom:80px;overflow-y:auto;min-height:0}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bg2);border-top:1px solid var(--bg3);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;text-align:center;padding:9px 2px;font-size:10px;color:var(--text2);cursor:pointer;transition:.2s}
.nav-btn.active{color:var(--accent2)}
.nav-btn .icon{font-size:20px;display:block;margin-bottom:2px}
.nav-build{text-align:center;font-size:9px;color:var(--text2);opacity:.75;padding:0 8px 6px;padding-bottom:calc(6px + env(safe-area-inset-bottom));line-height:1.2}

/* Cards */
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:12px}
.card-sm{background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:14px;font-size:16px;font-weight:600;border:none;cursor:pointer;width:100%;transition:.15s}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:active{background:var(--accent2)}
.btn-green{background:var(--green);color:#fff}
.btn-green:active{opacity:.8}
.btn-red{background:var(--red);color:#fff}
.btn-red:active{opacity:.8}
.btn-outline{background:transparent;border:2px solid var(--accent);color:var(--accent2)}
.btn-sm{padding:10px 16px;font-size:14px;border-radius:10px;width:auto}
.btn:disabled{opacity:.4;pointer-events:none}

/* Play screen */
.play-header{text-align:center;margin-bottom:20px}
.play-header h2{font-size:22px;margin-bottom:4px}
.play-header .sub{color:var(--text2);font-size:14px}

.question-counter{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.q-dot{width:10px;height:10px;border-radius:50%;background:var(--bg3)}
.q-dot.done{background:var(--green)}
.q-dot.wrong{background:var(--red)}
.q-dot.current{background:var(--accent);box-shadow:0 0 8px var(--accent)}

.asset-card{text-align:center;padding:24px 16px}
.asset-emoji{font-size:48px;margin-bottom:8px}
.asset-name{font-size:20px;font-weight:600}
.asset-symbol{font-size:14px;color:var(--text2)}
.asset-price{font-size:32px;font-weight:700;margin:16px 0 8px;font-variant-numeric:tabular-nums}

.chart-container{height:120px;margin:12px 0 20px;border-radius:10px;overflow:hidden;background:var(--bg)}
.chart-container canvas{width:100%;height:100%}

.predict-btns{display:flex;gap:12px;margin-top:16px}
.predict-btns .btn{flex:1;font-size:18px;padding:18px}

/* Timer */
.timer-block{text-align:center;padding:40px 20px}
.timer-block .icon-big{font-size:64px;margin-bottom:16px}
.timer-text{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;margin:16px 0}
.timer-label{color:var(--text2);font-size:14px}

/* Results */
.results-header{text-align:center;margin-bottom:20px}
.results-score{font-size:56px;font-weight:800;margin:12px 0}
.results-score.perfect{color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.4)}

.result-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;margin-bottom:8px}
.result-row.correct{background:rgba(0,184,148,.1);border:1px solid rgba(0,184,148,.2)}
.result-row.wrong{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2)}
.result-row .r-emoji{font-size:24px;flex-shrink:0}
.result-row .r-info{flex:1}
.result-row .r-label{font-size:14px;font-weight:600}
.result-row .r-detail{font-size:12px;color:var(--text2)}
.result-row .r-verdict{font-size:20px;flex-shrink:0}

/* Cooldown */
.cooldown-card{text-align:center;padding:32px}
.cooldown-card .remaining{font-size:28px;font-weight:700;color:var(--accent2);margin:12px 0}

/* Duels */
.duel-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border-radius:12px;margin-bottom:8px;cursor:pointer}
.duel-card .d-vs{font-size:14px;color:var(--text2);flex:1}
.duel-card .d-result{font-size:14px;font-weight:600}

.invite-code-block{text-align:center;margin:16px 0;padding:24px;background:var(--bg);border-radius:14px;border:2px dashed var(--accent)}
.invite-code{font-size:28px;font-weight:800;letter-spacing:4px;color:var(--accent2);margin:8px 0}

/* Duel CTA — заметный блок после раунда */
.duel-cta-banner{
  position:relative;overflow:hidden;border-radius:20px;padding:24px 18px 22px;text-align:center;margin-top:14px;
  background:linear-gradient(145deg,rgba(108,92,231,.42) 0%,rgba(9,132,227,.18) 45%,rgba(162,155,254,.12) 100%);
  border:1px solid rgba(162,155,254,.55);
  box-shadow:0 8px 32px rgba(0,0,0,.35),0 0 28px rgba(108,92,231,.25),inset 0 1px 0 rgba(255,255,255,.1);
}
.duel-cta-emoji-wrap{margin-bottom:10px}
.duel-cta-emoji{font-size:48px;display:inline-block;animation:duelPulse 2.2s ease-in-out infinite}
@keyframes duelPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px rgba(162,155,254,.5))}50%{transform:scale(1.08);filter:drop-shadow(0 0 18px rgba(108,92,231,.85))}}
.duel-cta-title{font-size:20px;font-weight:800;margin-bottom:8px;letter-spacing:.02em;color:#fff;text-shadow:0 0 20px rgba(162,155,254,.5)}
.duel-cta-sub{font-size:14px;color:rgba(232,232,240,.85);line-height:1.45;margin-bottom:16px;max-width:280px;margin-left:auto;margin-right:auto}
.duel-cta-btn{
  background:linear-gradient(135deg,#7c6cf0,#0984e3) !important;color:#fff !important;border:none !important;width:100%;
  padding:16px 20px;font-size:17px;font-weight:800;border-radius:16px;
  box-shadow:0 6px 24px rgba(108,92,231,.45),inset 0 1px 0 rgba(255,255,255,.2);
}
.duel-cta-btn:active{transform:scale(.98);opacity:.95}

/* Живые цены на экране «все предсказания сделаны» */
.summary-live-row{
  background:var(--bg2);border-radius:14px;padding:12px 14px;margin-bottom:10px;border:1px solid var(--bg3);
}
.slr-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.slr-emoji{font-size:26px;line-height:1}
.slr-meta{flex:1;min-width:0}
.slr-name{font-weight:700;font-size:15px}
.slr-start{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.35}
.slr-start .up{color:var(--green);font-weight:700}
.slr-start .down{color:var(--red);font-weight:700}
.slr-live{border-top:1px solid var(--bg3);padding-top:10px;margin-top:2px}
.slr-live-top{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px 12px;margin-bottom:8px}
.slr-live-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.slr-live-val{font-size:18px;font-weight:800;color:var(--accent2)}
.slr-live-pct{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.slr-live-pct.pct-up{color:var(--green)}
.slr-live-pct.pct-down{color:var(--red)}
.slr-live-pct.pct-flat{color:var(--text2)}
.slr-meter{position:relative;height:10px;background:var(--bg);border-radius:6px;margin-top:4px}
.slr-meter-line{position:absolute;left:50%;top:0;bottom:0;width:2px;margin-left:-1px;background:rgba(232,232,240,.25);z-index:1;border-radius:1px}
.slr-meter-dot{
  position:absolute;top:50%;width:12px;height:12px;margin:-6px 0 0 -6px;border-radius:50%;z-index:2;
  transition:left .45s ease-out,background .2s,box-shadow .2s;
}
.slr-meter-dot.dot-up{background:var(--green);box-shadow:0 0 10px rgba(0,184,148,.6)}
.slr-meter-dot.dot-down{background:var(--red);box-shadow:0 0 10px rgba(255,107,107,.55)}
.slr-meter-dot.dot-flat{background:var(--text2);box-shadow:none}
.tabular{font-variant-numeric:tabular-nums}
.live-pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;vertical-align:middle;animation:liveBlink 1.2s ease-in-out infinite}
@keyframes liveBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.85)}}

/* Raffle */
.raffle-prize{text-align:center;padding:32px 16px}
.raffle-prize .stars{font-size:56px;font-weight:800;color:var(--gold)}
.raffle-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.raffle-stat{text-align:center;padding:16px;background:var(--bg);border-radius:12px}
.raffle-stat .val{font-size:22px;font-weight:700}
.raffle-stat .lbl{font-size:12px;color:var(--text2);margin-top:4px}

/* Championship */
.champ-hero{text-align:center;padding:24px 16px;background:linear-gradient(135deg,rgba(108,92,231,.15),rgba(253,203,110,.1));border-radius:16px;margin-bottom:16px}
.champ-pool{font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--gold),#f0c040);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.champ-pool-label{font-size:13px;color:var(--text2);margin-top:4px}
.champ-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0}
.champ-info-item{text-align:center;padding:12px 6px;background:var(--bg2);border-radius:12px}
.champ-info-item .val{font-size:18px;font-weight:700}
.champ-info-item .lbl{font-size:11px;color:var(--text2);margin-top:2px}
.champ-q-card{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.champ-q-asset{display:flex;align-items:center;gap:10px}
.champ-q-emoji{font-size:28px}
.champ-q-label{font-weight:600;font-size:15px}
.champ-q-price{font-size:12px;color:var(--text2)}
.champ-q-btns{display:flex;gap:6px}
.champ-q-btns button{width:44px;height:44px;border-radius:12px;border:none;font-size:20px;cursor:pointer;transition:all .15s}
.champ-q-btns .up{background:rgba(0,184,148,.15);color:#00b894}
.champ-q-btns .down{background:rgba(255,107,107,.15);color:#ff6b6b}
.champ-q-btns .up:hover{background:rgba(0,184,148,.3)}
.champ-q-btns .down:hover{background:rgba(255,107,107,.3)}
.champ-q-btns .selected{transform:scale(1.15);box-shadow:0 0 10px rgba(108,92,231,.3)}
.champ-q-btns .up.selected{background:#00b894;color:#fff}
.champ-q-btns .down.selected{background:#ff6b6b;color:#fff}
.champ-q-result{font-size:22px;min-width:44px;text-align:center}
.champ-lb{margin-top:16px}
.champ-lb-row{display:flex;align-items:center;padding:10px 14px;background:var(--bg2);border-radius:10px;margin-bottom:6px}
.champ-lb-place{width:30px;font-weight:700;font-size:16px}
.champ-lb-name{flex:1;font-weight:500}
.champ-lb-score{font-weight:700;color:var(--accent)}
.champ-lb-row.me{background:rgba(108,92,231,.15);border:1px solid var(--accent)}
.seg-wrap{display:flex;background:var(--bg);border-radius:12px;padding:3px;margin-bottom:16px}
.seg-btn{flex:1;text-align:center;padding:10px 8px;border-radius:10px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:.2s}
.seg-btn.active{background:var(--accent);color:#fff}

/* Profile */
.profile-header{text-align:center;padding:20px 0}
.avatar{width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;margin:0 auto 12px;color:#fff}
.profile-name{font-size:20px;font-weight:600}
.premium-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),#f0c040);color:#000;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-item{text-align:center;padding:14px 8px;background:var(--bg2);border-radius:12px}
.stat-item .val{font-size:20px;font-weight:700}
.stat-item .lbl{font-size:11px;color:var(--text2);margin-top:4px}

.achievements-title{font-size:16px;font-weight:600;margin:20px 0 10px}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ach-item{text-align:center;padding:10px 6px;background:var(--bg2);border-radius:12px;opacity:.35;cursor:pointer;transition:transform .15s}
.ach-item:active{transform:scale(.95)}
.ach-item.unlocked{opacity:1;background:var(--bg2);box-shadow:0 0 0 1px var(--accent)}
.ach-item .ach-icon{font-size:24px}
.ach-item .ach-name{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.2}

.av-pick{width:40px;height:40px;font-size:24px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-radius:10px;cursor:pointer;border:2px solid transparent;transition:.15s}
.av-pick:active{transform:scale(.9)}
.av-pick.active{border-color:var(--accent);box-shadow:0 0 8px rgba(0,122,255,.4)}
.title-pick{padding:6px 14px;background:var(--bg2);border-radius:10px;font-size:13px;cursor:pointer;border:2px solid transparent;transition:.15s}
.title-pick:active{transform:scale(.95)}
.title-pick.active{border-color:var(--accent);color:var(--accent);font-weight:600}

.progress-bar{height:8px;background:var(--bg2);border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:6px;transition:width .4s ease}
.pf-chip{padding:5px 12px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--text2);cursor:pointer;border:1px solid transparent;transition:.15s}
.pf-chip:active{transform:scale(.95)}
.pf-chip.done{border-color:var(--accent);color:var(--accent)}
.frame-pick{text-align:center;cursor:pointer;padding:6px;border-radius:10px;border:2px solid transparent;transition:.15s}
.frame-pick:active{transform:scale(.9)}
.frame-pick.active{border-color:var(--accent);background:rgba(0,122,255,.1)}

/* Confetti */
.confetti-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:200;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;animation:confetti-fall 3s ease-out forwards}
@keyframes confetti-fall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* Premium popup */
.popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.popup-overlay.show{display:flex}
.popup{background:var(--card);border-radius:20px;padding:28px;max-width:340px;width:100%;text-align:center}
.popup h3{font-size:20px;margin-bottom:12px}
.popup p{color:var(--text2);font-size:14px;margin-bottom:16px;line-height:1.5}
.popup .btn{margin-top:8px}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text2)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--bg3);padding:12px 20px;border-radius:12px;font-size:14px;z-index:400;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Leaderboard */
.lb-list{display:flex;flex-direction:column;gap:8px}
.lb-row{display:flex;flex-direction:column;align-items:stretch;gap:6px;padding:12px 14px;background:var(--card);border-radius:12px;border:1px solid var(--bg3)}
.lb-row.lb-me{border-color:var(--accent);background:linear-gradient(135deg,rgba(108,92,231,.14),var(--card))}
.lb-row-head{display:flex;align-items:center;gap:8px;width:100%;min-width:0}
.lb-rank{font-size:20px;min-width:36px;text-align:center;line-height:1.15;flex-shrink:0}
.lb-name-wrap{flex:1;min-width:0}
.lb-name{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-av{font-size:22px;flex-shrink:0}
.lb-title{font-size:11px;color:var(--accent);font-weight:500;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:11px;color:var(--text2);line-height:1.35;padding-right:2px}
.lb-pts{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1.05;padding:4px 10px;border-radius:10px;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.35)}
.lb-pts-num{font-size:17px;font-weight:800;color:var(--gold)}
.lb-pts-lbl{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.lb-you{border-radius:14px;padding:14px 16px;margin-bottom:12px}
.lb-you.in{border:1px solid var(--accent);background:rgba(108,92,231,.1)}
.lb-you.out{border:1px dashed var(--bg3)}

/* Friends */
.fr-section{margin-top:16px}
.fr-title{font-size:16px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.fr-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:var(--red);color:#fff;font-size:11px;font-weight:700}
.fr-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border-radius:12px;margin-bottom:8px}
.fr-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.fr-info{flex:1;min-width:0}
.fr-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fr-rating{font-size:12px;color:var(--gold)}
.fr-actions{display:flex;gap:6px;flex-shrink:0}
.fr-btn{background:none;border:1px solid var(--bg3);color:var(--text2);font-size:18px;width:34px;height:34px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fr-btn:active{opacity:.7}
.fr-btn.accept{border-color:var(--green);color:var(--green)}
.fr-btn.decline{border-color:var(--red);color:var(--red)}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <div id="ratingStrip" class="rating-strip" style="display:none" role="status" aria-live="polite"></div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Загрузка...</p></div>
  </div>
  <div class="nav">
    <div class="nav-btn active" onclick="showTab('play')"><span class="icon">🎯</span>Играть</div>
    <div class="nav-btn" onclick="showTab('duels')"><span class="icon">⚔️</span>Дуэли</div>
    <div class="nav-btn" onclick="showTab('rating')"><span class="icon">🏆</span>Рейтинг</div>
    <div class="nav-btn" onclick="showTab('friends')"><span class="icon">👥</span>Друзья</div>
    <div class="nav-btn" onclick="showTab('profile')"><span class="icon">👤</span>Профиль</div>
  </div>
  <div id="buildMarker" class="nav-build" title="Если не совпадает с версией на сервере — открой приложение заново из бота">сборка 2.6.0</div>
</div>
<div class="toast" id="toast"></div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.expand();
  tg.ready();
}

let currentUser = null;
let botName = '';
let currentTab = 'play';
let activeRound = null;
let currentQuestionIdx = 0;
let sparklineCache = {};
let timerInterval = null;
let livePriceInterval = null;
let matchmakingPollTimer = null;
let duelsMatchmakingActive = false;

const BINANCE_SYM = { bitcoin:'BTCUSDT', ethereum:'ETHUSDT', solana:'SOLUSDT', dogecoin:'DOGEUSDT', 'the-open-network':'TONUSDT', ripple:'XRPUSDT', binancecoin:'BNBUSDT', cardano:'ADAUSDT', gold:'PAXGUSDT' };

async function clientFetchPrices(assetIds) {
  const prices = {};
  const syms = assetIds.map(id => BINANCE_SYM[id]).filter(Boolean);
  if (syms.length === 0) return prices;
  try {
    const url = 'https://api.binance.com/api/v3/ticker/price?symbols=' + encodeURIComponent(JSON.stringify(syms));
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const symToId = {};
    for (const [id, s] of Object.entries(BINANCE_SYM)) { symToId[s] = id; }
    for (const t of data) {
      const id = symToId[t.symbol];
      if (id && t.price) prices[id] = parseFloat(t.price);
    }
  } catch (e) {
    for (const id of assetIds) {
      const sym = BINANCE_SYM[id];
      if (!sym) continue;
      try {
        const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=' + sym);
        const d = await r.json();
        if (d?.price) prices[id] = parseFloat(d.price);
      } catch (_) { /* skip */ }
    }
  }
  if (assetIds.includes('usd-rub') && !prices['usd-rub']) {
    try {
      const r = await fetch('https://open.er-api.com/v6/latest/USD');
      const d = await r.json();
      if (d?.rates?.RUB) prices['usd-rub'] = d.rates.RUB;
    } catch (_) {}
  }
  if (assetIds.includes('eur-rub') && !prices['eur-rub']) {
    try {
      const r = await fetch('https://open.er-api.com/v6/latest/EUR');
      const d = await r.json();
      if (d?.rates?.RUB) prices['eur-rub'] = d.rates.RUB;
    } catch (_) {}
  }
  if (assetIds.includes('eth-gas') && !prices['eth-gas']) {
    try {
      const r = await fetch('https://api.etherscan.io/api?module=gastracker&action=gasoracle');
      const d = await r.json();
      if (d?.result?.ProposeGasPrice) prices['eth-gas'] = parseFloat(d.result.ProposeGasPrice);
    } catch (_) {}
  }
  return prices;
}

function stopMatchmakingPoll() {
  if (matchmakingPollTimer) {
    clearInterval(matchmakingPollTimer);
    matchmakingPollTimer = null;
  }
  duelsMatchmakingActive = false;
}

function stopLivePriceUpdates() {
  if (livePriceInterval) {
    clearInterval(livePriceInterval);
    livePriceInterval = null;
  }
}

function duelCtaHtml() {
  return `<div class="duel-cta-banner" role="region" aria-label="Дуэли">
    <div class="duel-cta-emoji-wrap"><span class="duel-cta-emoji">⚔️</span></div>
    <div class="duel-cta-title">Дуэль с другом</div>
    <p class="duel-cta-sub">Те же 5 активов — кто угадает точнее? Победитель сравнивается по очкам.</p>
    <button type="button" class="btn duel-cta-btn" onclick="showTab('duels')">Вызвать на дуэль</button>
  </div>`;
}

async function tickLivePrices(questions) {
  const assetIds = [...new Set(questions.map(q => q.asset))];
  let prices = {};

  try {
    const data = await api('/api/prices/live?ids=' + encodeURIComponent(assetIds.join(',')));
    if (data.ok && data.prices) prices = data.prices;
  } catch (_) {}

  const missing = assetIds.filter(id => !prices[id] || prices[id] <= 0);
  if (missing.length > 0) {
    try {
      const client = await clientFetchPrices(missing);
      Object.assign(prices, client);
      if (Object.keys(client).length > 0) {
        apiPost('/api/prices/report', { prices: client }).catch(() => {});
      }
    } catch (_) {}
  }

  questions.forEach((q, i) => {
    const cur = prices[q.asset];
    const start = Number(q.price_at_start);
    const elV = document.getElementById('slLive-' + i);
    const elP = document.getElementById('slPct-' + i);
    const elDot = document.getElementById('slDot-' + i);
    if (!elV) return;
    if (cur == null || !Number.isFinite(cur) || !Number.isFinite(start) || start === 0) {
      elV.textContent = '—';
      if (elP) { elP.textContent = ''; elP.className = 'slr-live-pct'; }
      return;
    }
    elV.textContent = formatPrice(cur, q.asset);
    const pct = ((cur - start) / start) * 100;
    const sign = pct >= 0 ? '+' : '';
    if (elP) {
      elP.textContent = sign + pct.toFixed(3) + '%';
      elP.className = 'slr-live-pct ' + (pct > 0.05 ? 'pct-up' : pct < -0.05 ? 'pct-down' : 'pct-flat');
    }
    if (elDot) {
      const clamp = Math.max(-2.5, Math.min(2.5, pct));
      const pos = 50 + (clamp / 2.5) * 42;
      elDot.style.left = pos + '%';
      elDot.classList.remove('dot-up', 'dot-down', 'dot-flat');
      elDot.classList.add(pct > 0.05 ? 'dot-up' : pct < -0.05 ? 'dot-down' : 'dot-flat');
    }
  });
}

function startLivePriceUpdates(questions) {
  stopLivePriceUpdates();
  tickLivePrices(questions);
  livePriceInterval = setInterval(() => tickLivePrices(questions), 4000);
}

const $ = id => document.getElementById(id);
const content = $('content');

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function formatTimeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'только что';
  if (m < 60) return m + ' мин назад';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' ч назад';
  const days = Math.floor(h / 24);
  if (days === 1) return 'вчера';
  if (days < 7) return days + ' дн назад';
  return new Date(dateStr).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

/** Веса как в database.js computeLeaderboardRating */
const LB_ROUND_CAP_CLIENT = 250;

function coalesceLeaderboardRating(row) {
  if (row && row.rating != null && row.rating !== '') {
    const n = Number(row.rating);
    if (Number.isFinite(n)) return n;
  }
  const t5 = Number(row?.total_5of5) || 0;
  const bs = Number(row?.best_streak) || 0;
  const dw = Number(row?.duel_wins) || 0;
  const tr = Number(row?.total_rounds) || 0;
  const bp = Number(row?.bonus_points) || 0;
  return t5 * 140 + bs * 35 + dw * 25 + Math.min(tr, LB_ROUND_CAP_CLIENT) + bp;
}

function updateRatingStrip(src) {
  const el = document.getElementById('ratingStrip');
  if (!el) return;
  let r = src && src.rating;
  const rk = src && src.leaderboardRank;
  const tp = src && src.totalPlayers;
  if ((r == null || r === '') && currentUser) {
    r = coalesceLeaderboardRating({
      total_5of5: currentUser.total_5of5,
      best_streak: currentUser.best_streak,
      duel_wins: currentUser.duel_wins,
      total_rounds: currentUser.total_rounds,
    });
  }
  const n = Number(r);
  if (!Number.isFinite(n)) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  el.innerHTML = '🏆 <strong>' + n + '</strong> очков рейтинга' +
    (rk != null ? ' · место <strong>#' + rk + '</strong>' : '') +
    (tp != null ? ' <span style="opacity:.85;font-size:11px">из ' + tp + '</span>' : '');
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (tg?.initData) headers['X-Telegram-Init-Data'] = tg.initData;
  const res = await fetch(path, { ...opts, headers: { ...headers, ...opts.headers } });
  return res.json();
}

async function apiPost(path, body) {
  return api(path, { method: 'POST', body: JSON.stringify(body) });
}

// --- Auth ---

/** Параметр запуска: initData → query tgWebAppStartParam / startapp → hash #tgWebAppStartParam (клиенты по-разному передают). */
function getTelegramStartParam() {
  const fromTgUnsafe = tg?.initDataUnsafe?.start_param != null ? String(tg.initDataUnsafe.start_param).trim() : '';
  let fromInitData = '';
  if (tg?.initData) {
    try {
      fromInitData = new URLSearchParams(tg.initData).get('start_param') || '';
    } catch (e) { /* noop */ }
  }
  const p = new URLSearchParams(window.location.search);
  const fromQuery = (p.get('tgWebAppStartParam') || p.get('startapp') || '').trim();
  let fromHash = '';
  if (window.location.hash && window.location.hash.length > 1) {
    try {
      const hp = new URLSearchParams(window.location.hash.slice(1));
      fromHash = (hp.get('tgWebAppStartParam') || '').trim();
    } catch (e) { /* noop */ }
  }
  return (fromTgUnsafe || fromInitData || fromQuery || fromHash || '').trim();
}

/** Реферал только число / ref_123 — не передаём duel_... в БД (referred_by BIGINT) */
function referralForAuth(startParam) {
  if (!startParam || startParam.startsWith('duel_')) return '';
  if (/^\d+$/.test(startParam)) return startParam;
  const m = /^ref_(\d+)$/.exec(startParam);
  return m ? m[1] : '';
}

async function auth() {
  const initData = tg?.initData || '';
  const ref = referralForAuth(getTelegramStartParam());

  let data;
  try {
    data = await apiPost('/api/auth', { initData, ref, chatId: tg?.initDataUnsafe?.user?.id });
  } catch (e) {
    content.innerHTML = '<div class="loading">Сервер не отвечает. Попробуй позже.</div>';
    return;
  }
  if (!data.ok) { content.innerHTML = `<div class="loading">Ошибка: ${data.error || 'неизвестная'}</div>`; return; }

  currentUser = data.user;
  botName = data.botUsername || '';
  updateRatingStrip({
    rating: data.rating,
    leaderboardRank: data.leaderboardRank,
    totalPlayers: data.totalPlayers,
  });

  const sp = getTelegramStartParam();
  if (sp.startsWith('duel_') || sp.startsWith('friend_')) {
    // deep link will handle navigation
  } else {
    showTab('play');
  }
}

// --- Tabs ---

function showTab(tab) {
  if (currentTab === 'duels' && tab !== 'duels') {
    stopMatchmakingPoll();
    apiPost('/api/duel/matchmaking/cancel', {}).catch(() => {});
  }
  currentTab = tab;
  const tabs = ['play','duels','rating','friends','profile'];
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', tabs[i] === tab);
  });
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  stopLivePriceUpdates();

  if (tab === 'play') loadPlay();
  else if (tab === 'rating') loadRating();
  else if (tab === 'duels') loadDuels();
  else if (tab === 'friends') loadFriendsTab();
  else if (tab === 'profile') loadProfile();
}

// --- PLAY ---

async function loadPlay() {
  stopLivePriceUpdates();
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  const data = await api('/api/round/check');
  if (!data.ok) { content.innerHTML = '<div class="card">Ошибка загрузки</div>'; return; }

  if (data.status === 'show_results' && data.round && data.questions) {
    renderResults(data.round, data.questions);
    return;
  }

  if (data.status === 'in_progress') {
    activeRound = data.round;
    const questions = data.questions;
    const firstUnanswered = questions.findIndex(q => !q.user_answer);
    currentQuestionIdx = firstUnanswered >= 0 ? firstUnanswered : questions.length;
    if (currentQuestionIdx >= questions.length) {
      renderPredictionSummary(data.round, questions);
    } else {
      renderQuestion(data.round, questions, currentQuestionIdx);
    }
  } else if (data.status === 'waiting') {
    const round = data.round;
    const resolveAt = new Date(round.resolve_after);
    if (resolveAt <= new Date()) {
      const results = await api(`/api/round/${round.id}/results`);
      if (results.round?.is_resolved) {
        renderResults(results.round, results.questions);
      } else {
        renderPredictionSummary(round, results.questions || []);
      }
    } else {
      const results = await api(`/api/round/${round.id}/results`);
      renderPredictionSummary(round, results.questions || []);
    }
  } else {
    if (data.canStart?.ok) {
      renderStartScreen();
    } else {
      renderCooldown(data.canStart);
    }
  }
}

function renderStartScreen() {
  content.innerHTML = `
    <div class="play-header">
      <h2>🎯 Предскажи</h2>
      <div class="sub">5 активов — выше или ниже через 10 минут?</div>
    </div>
    <div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:64px;margin-bottom:16px">📈</div>
      <p style="color:var(--text2);margin-bottom:20px">Угадай направление цены 5 активов.<br>Крипта, валюты, золото — результат через 10 минут.</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:24px">
        <span style="background:var(--bg);padding:5px 10px;border-radius:8px;font-size:12px">₿ BTC</span>
        <span style="background:var(--bg);padding:5px 10px;border-radius:8px;font-size:12px">◎ SOL</span>
        <span style="background:var(--bg);padding:5px 10px;border-radius:8px;font-size:12px">🐕 DOGE</span>
        <span style="background:var(--bg);padding:5px 10px;border-radius:8px;font-size:12px">💵 USD/RUB</span>
        <span style="background:var(--bg);padding:5px 10px;border-radius:8px;font-size:12px">🥇 Золото</span>
        <span style="background:var(--bg);padding:5px 10px;border-radius:8px;font-size:12px">⛽ Gas</span>
      </div>
      <button class="btn btn-accent" onclick="startRound()">Начать раунд</button>
    </div>
    <div class="card-sm" style="text-align:center;cursor:pointer" onclick="showTab('rating')" role="button">
      <span style="font-size:14px;font-weight:600">🏆 Рейтинг</span>
      <p style="font-size:12px;color:var(--text2);margin-top:4px">Недельный и глобальный рейтинг</p>
    </div>`;
}

function renderCooldown(info) {
  const remaining = info?.remaining || 0;
  content.innerHTML = `
    <div class="play-header">
      <h2>🎯 Предскажи</h2>
    </div>
    <div class="cooldown-card card">
      <div style="font-size:48px;margin-bottom:12px">⏳</div>
      <p style="color:var(--text2)">Следующий раунд доступен через</p>
      <div class="remaining" id="cdTimer">${remaining} мин</div>
    </div>`;
}

async function startRound() {
  const btn = content.querySelector('.btn-accent');
  if (btn) { btn.disabled = true; btn.textContent = 'Загрузка...'; }

  const data = await apiPost('/api/round/start', {});
  if (!data.ok) { toast(data.error || 'Ошибка'); if (btn) { btn.disabled = false; btn.textContent = 'Начать раунд'; } return; }

  activeRound = { id: data.round_id, started_at: data.started_at, resolve_after: data.resolve_after };
  currentQuestionIdx = 0;

  const questions = data.questions.map((q, i) => ({
    ...q, question_index: i, round_id: data.round_id,
    price_at_start: q.price, user_answer: null
  }));

  renderQuestion(activeRound, questions, 0);
}

async function renderQuestion(round, questions, idx) {
  const q = questions[idx];
  if (!q) { renderWaiting(round); return; }

  const dots = questions.map((qq, i) => {
    if (i < idx) return `<div class="q-dot ${qq.is_correct !== undefined ? (qq.is_correct ? 'done' : 'wrong') : 'done'}"></div>`;
    if (i === idx) return '<div class="q-dot current"></div>';
    return '<div class="q-dot"></div>';
  }).join('');

  const priceFormatted = formatPrice(q.price_at_start || q.price, q.asset);

  content.innerHTML = `
    <div class="question-counter">${dots}</div>
    <div class="card asset-card">
      <div class="asset-emoji">${q.asset_emoji || q.emoji || ''}</div>
      <div class="asset-name">${q.asset_label || q.label}</div>
      <div class="asset-symbol">${(q.symbol || q.asset || '').toUpperCase()}/USD</div>
      <div class="asset-price">${priceFormatted}</div>
      <div class="chart-container"><canvas id="chart"></canvas></div>
      <div style="color:var(--text2);font-size:13px;margin-bottom:8px">Через 10 минут цена будет...</div>
      <div class="predict-btns">
        <button class="btn btn-green" onclick="submitAnswer(${round.id}, ${idx}, 'up', this)">📈 Выше</button>
        <button class="btn btn-red" onclick="submitAnswer(${round.id}, ${idx}, 'down', this)">📉 Ниже</button>
      </div>
    </div>`;

  loadChart(q.asset || q.id);
}

async function submitAnswer(roundId, idx, answer, btnEl) {
  document.querySelectorAll('.predict-btns .btn').forEach(b => b.disabled = true);

  const data = await apiPost('/api/round/answer', { roundId, questionIndex: idx, answer });
  if (!data.ok) { toast(data.error || 'Ошибка'); return; }

  if (data.is_complete) {
    const round = await api(`/api/round/${roundId}/results`);
    renderPredictionSummary(round.round || activeRound, round.questions || []);
  } else {
    currentQuestionIdx = idx + 1;
    const allQ = await api(`/api/round/${roundId}/results`);
    setTimeout(() => renderQuestion(activeRound, allQ.questions, idx + 1), 300);
  }
}

function renderPredictionSummary(round, questions) {
  const resolveAt = new Date(round.resolve_after);

  const rows = questions.map((q, i) => {
    const arrow = q.user_answer === 'up' ? '📈 Выше' : '📉 Ниже';
    const predClass = q.user_answer === 'up' ? 'up' : 'down';
    const start = Number(q.price_at_start);
    const startStr = formatPrice(start, q.asset);
    return `
      <div class="summary-live-row" data-idx="${i}" data-asset="${q.asset}">
        <div class="slr-head">
          <div class="slr-emoji">${q.asset_emoji || ''}</div>
          <div class="slr-meta">
            <div class="slr-name">${q.asset_label}</div>
            <div class="slr-start">Старт: <span class="tabular">${startStr}</span> · прогноз <b class="${predClass}">${arrow}</b></div>
          </div>
        </div>
        <div class="slr-live">
          <div class="slr-live-top">
            <span class="slr-live-label"><span class="live-pulse"></span>Сейчас</span>
            <span class="slr-live-val tabular" id="slLive-${i}">…</span>
            <span class="slr-live-pct" id="slPct-${i}"></span>
          </div>
          <div class="slr-meter"><div class="slr-meter-line"></div><div class="slr-meter-dot dot-flat" id="slDot-${i}" style="left:50%"></div></div>
        </div>
      </div>`;
  }).join('');

  function updateTimer() {
    const diff = resolveAt - new Date();
    if (diff <= 0) {
      clearInterval(timerInterval);
      checkResults(round.id);
      return;
    }
    const min = Math.floor(diff / 60000);
    const sec = Math.floor((diff % 60000) / 1000);
    const el = document.getElementById('summaryTimer');
    if (el) el.textContent = `${min}:${String(sec).padStart(2, '0')}`;
  }

  content.innerHTML = `
    <div class="card" style="text-align:center;padding:22px 14px 18px">
      <div style="font-size:36px;margin-bottom:8px">✅</div>
      <h3 style="margin:0 0 4px">Все предсказания сделаны!</h3>
      <p style="color:var(--text2);font-size:13px;margin-bottom:6px">Официальный результат через <span id="summaryTimer" style="color:var(--accent2);font-weight:700">--:--</span></p>
      <p style="color:var(--text2);font-size:12px;margin-bottom:14px;opacity:.9">Ниже — <b>живые цены</b> (обновление ~каждые 4 сек). Итог раунда всё равно по цене в момент завершения.</p>
      ${rows}
      <p style="color:var(--text2);font-size:11px;margin-top:12px">Мы пришлём уведомление, когда раунд закроется.</p>
    </div>
    ${duelCtaHtml()}`;

  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
  startLivePriceUpdates(questions);
}

function renderWaiting(round) {
  const resolveAt = new Date(round.resolve_after);

  function updateTimer() {
    const diff = resolveAt - new Date();
    if (diff <= 0) {
      clearInterval(timerInterval);
      checkResults(round.id);
      return;
    }
    const min = Math.floor(diff / 60000);
    const sec = Math.floor((diff % 60000) / 1000);
    const el = document.getElementById('waitTimer');
    if (el) el.textContent = `${min}:${String(sec).padStart(2, '0')}`;
  }

  content.innerHTML = `
    <div class="timer-block card">
      <div class="icon-big">⏱️</div>
      <p style="color:var(--text2)">Ожидание результатов</p>
      <div class="timer-text" id="waitTimer">--:--</div>
      <div class="timer-label">Цены обновятся и раунд завершится</div>
    </div>
    ${duelCtaHtml()}`;

  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
}

async function checkResults(roundId) {
  const data = await api(`/api/round/${roundId}/results`);
  if (data.round?.is_resolved) {
    stopLivePriceUpdates();
    renderResults(data.round, data.questions);
  } else {
    setTimeout(() => checkResults(roundId), 5000);
  }
}

function renderResults(round, questions) {
  const score = round.correct_count;
  const is5of5 = score === 5;

  if (is5of5) showConfetti();

  const rows = questions.map(q => {
    const isCorrect = q.is_correct;
    const priceStart = formatPrice(q.price_at_start, q.asset);
    const priceEnd = q.price_at_resolve ? formatPrice(q.price_at_resolve, q.asset) : '—';
    const arrow = q.user_answer === 'up' ? '📈' : '📉';
    const changePercent = q.price_at_resolve
      ? (((q.price_at_resolve - q.price_at_start) / q.price_at_start) * 100).toFixed(2) : '—';
    return `
      <div class="result-row ${isCorrect ? 'correct' : 'wrong'}">
        <div class="r-emoji">${q.asset_emoji || ''}</div>
        <div class="r-info">
          <div class="r-label">${q.asset_label} ${arrow}</div>
          <div class="r-detail">${priceStart} → ${priceEnd} (${changePercent}%)</div>
        </div>
        <div class="r-verdict">${isCorrect ? '✅' : '❌'}</div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div class="results-header">
      <div style="font-size:48px;margin-bottom:8px">${is5of5 ? '🏆' : score >= 3 ? '👍' : '😔'}</div>
      <div class="results-score ${is5of5 ? 'perfect' : ''}">${score}/5</div>
      <p style="color:var(--text2)">${is5of5 ? 'Идеально! 5 из 5!' : score >= 3 ? 'Неплохо!' : 'Попробуй ещё!'}</p>
    </div>
    ${rows}
    <button class="btn btn-accent" style="margin-top:16px" onclick="loadPlay()">Далее</button>`;
}

// --- Chart ---

const CC_SYM = { bitcoin:'BTC', ethereum:'ETH', solana:'SOL', dogecoin:'DOGE', 'the-open-network':'TON', ripple:'XRP', binancecoin:'BNB', cardano:'ADA' };

async function loadChart(assetId) {
  const canvas = document.getElementById('chart');
  if (!canvas) return;
  const container = canvas.parentElement;

  let prices = sparklineCache[assetId];
  if (!prices) {
    const sym = CC_SYM[assetId];
    if (sym) {
      try {
        const r = await fetch(`https://min-api.cryptocompare.com/data/v2/histohour?fsym=${sym}&tsym=USD&limit=24`);
        const j = await r.json();
        prices = j?.Data?.Data?.map(p => p.close) || [];
      } catch (e) { prices = []; }
    } else {
      prices = [];
    }
    sparklineCache[assetId] = prices;
  }
  if (prices.length < 2) {
    container.style.display = 'none';
    return;
  }
  container.style.display = '';

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  const last100 = prices.slice(-100);
  const min = Math.min(...last100);
  const max = Math.max(...last100);
  const range = max - min || 1;

  const isUp = last100[last100.length - 1] >= last100[0];
  const color = isUp ? '#00b894' : '#ff6b6b';

  ctx.beginPath();
  last100.forEach((p, i) => {
    const x = (i / (last100.length - 1)) * w;
    const y = h - ((p - min) / range) * (h - 8) - 4;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '30');
  grad.addColorStop(1, color + '00');
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
}

async function cancelRandomDuelSearch() {
  stopMatchmakingPoll();
  try { await apiPost('/api/duel/matchmaking/cancel', {}); } catch (e) { /* noop */ }
  loadDuels();
}

async function startRandomDuelMatch() {
  stopMatchmakingPoll();
  duelsMatchmakingActive = true;
  const data = await apiPost('/api/duel/matchmaking/join', {});
  if (!data.ok) {
    duelsMatchmakingActive = false;
    toast(data.error || 'Не удалось начать поиск');
    return;
  }
  if (data.matched) {
    duelsMatchmakingActive = false;
    toast('Соперник найден!');
    enterMatchedDuel(data);
    return;
  }
  if (data.waiting) {
    renderMatchmakingWait();
    matchmakingPollTimer = setInterval(async () => {
      if (!duelsMatchmakingActive) return;
      try {
        const p = await api('/api/duel/matchmaking/poll');
        if (!p.ok) return;
        if (p.matched) {
          stopMatchmakingPoll();
          toast('Соперник найден!');
          enterMatchedDuel(p);
        } else if (!p.waiting && duelsMatchmakingActive) {
          stopMatchmakingPoll();
          toast('Поиск прерван');
          loadDuels();
        }
      } catch (e) { /* тихо */ }
    }, 2200);
  }
}

async function loadDuels() {
  content.innerHTML = `

      <h2>⚔️ Дуэли</h2>

    <div id="duelContent"><div class="loading"><div class="spinner"></div></div></div>`;

  const data = await api('/api/duels/history');
  const el = document.getElementById('duelContent');
  if (!data.ok || !data.duels?.length) {
    el.innerHTML = '<div class="card" style="text-align:center;color:var(--text2);padding:32px">Пока нет дуэлей. Создай первую!</div>';
    return;
  }

  const staleIds = data.duels.filter(d => !d.opponent_id && !d.is_resolved && d.creator_id == currentUser.telegram_id).map(d => d.id);

  el.innerHTML =
    (staleIds.length > 1 ? `<button class="btn btn-outline" style="margin-bottom:12px;font-size:12px;padding:10px" onclick="cancelAllStaleDuels([${staleIds.join(',')}])">🗑 Удалить все без соперника (${staleIds.length})</button>` : '') +
    '<div style="font-size:14px;font-weight:600;margin-bottom:8px">История</div>' +
    data.duels.map(d => {
      const opp = d.opponent_display ? escapeHtml(d.opponent_display) : null;
      const tq = d.total_q || 5;
      let statusIcon, statusText, statusColor = '', detail = '';

      if (d.is_resolved) {
        const isWin = d.winner_id == currentUser.telegram_id;
        const isDraw = d.is_draw;
        const isCreator = d.creator_id == currentUser.telegram_id;
        const myScore = isCreator ? (d.creator_correct ?? '?') : (d.opponent_correct ?? '?');
        const oppScore = isCreator ? (d.opponent_correct ?? '?') : (d.creator_correct ?? '?');
        if (isWin) { statusIcon = '🏆'; statusText = 'Победа'; statusColor = 'var(--green)'; }
        else if (isDraw) { statusIcon = '🤝'; statusText = 'Ничья'; statusColor = 'var(--text2)'; }
        else { statusIcon = '😔'; statusText = 'Поражение'; statusColor = 'var(--red)'; }
        detail = `${myScore}:${oppScore} из ${tq}`;
      } else if (!d.opponent_id) {
        statusIcon = '📨'; statusText = 'Ждёт соперника'; statusColor = '#f0ad4e';
        detail = 'Ссылка отправлена';
      } else if (d.both_answered) {
        statusIcon = '⏳'; statusText = 'Подсчёт результатов'; statusColor = '#5bc0de';
        detail = 'Оба ответили, ждём итоги';
      } else {
        statusIcon = '🎮'; statusText = 'В процессе'; statusColor = '#5bc0de';
        const myDone = d.my_answered >= tq;
        const oppDone = d.opp_answered >= tq;
        if (myDone && !oppDone) detail = `Ты ✅ — соперник ${d.opp_answered}/${tq}`;
        else if (!myDone && oppDone) detail = `Соперник ✅ — ты ${d.my_answered}/${tq}`;
        else if (!myDone && !oppDone) detail = `Ты ${d.my_answered}/${tq} — сопер. ${d.opp_answered}/${tq}`;
        else detail = 'Оба ответили';
      }

      const canCancel = !d.opponent_id && !d.is_resolved && d.creator_id == currentUser.telegram_id;
      const oppLine = opp ? `vs ${opp}` : '';
      const timeAgo = formatTimeAgo(d.started_at);
      return `<div class="duel-card" style="position:relative">
        <div onclick="openDuel(${d.id})" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">
          <div style="font-size:22px;width:28px;text-align:center">${statusIcon}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-weight:600;font-size:13px">Дуэль #${d.id}</span>
              ${oppLine ? `<span style="font-size:12px;color:var(--text2)">${oppLine}</span>` : ''}
            </div>
            <div style="font-size:12px;color:${statusColor};font-weight:500;margin-top:2px">${statusText}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:1px">${detail}${timeAgo ? ' · ' + timeAgo : ''}</div>
          </div>
        </div>
        ${canCancel ? `<button onclick="event.stopPropagation();cancelOneDuel(${d.id})" style="background:none;border:none;color:var(--red);font-size:18px;padding:6px 10px;cursor:pointer;flex-shrink:0" title="Удалить">✕</button>` : ''}
      </div>`;
    }).join('');
}

async function cancelAllStaleDuels(ids) {

  const url = `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`;

async function playDuel(duelId, questions, idx = 0) {
  if (idx >= questions.length) {
    content.innerHTML = `
      <div class="timer-block card">
        <div class="icon-big">⚔️</div>
        <p>Ответы отправлены! Ждём соперника и результаты.</p>
        <button class="btn btn-outline" style="margin-top:16px" onclick="showTab('duels')">К дуэлям</button>
      </div>`;
    return;
  }

  const q = questions[idx];
  const dots = questions.map((_, i) => `<div class="q-dot ${i < idx ? 'done' : i === idx ? 'current' : ''}"></div>`).join('');
  const priceFormatted = formatPrice(q.price_at_start || q.price, q.asset);

  content.innerHTML = `
    <div style="text-align:center;color:var(--accent2);font-size:13px;margin-bottom:8px">⚔️ Дуэль</div>
    <div class="question-counter">${dots}</div>
    <div class="card asset-card">
      <div class="asset-emoji">${q.asset_emoji || q.emoji || ''}</div>
      <div class="asset-name">${q.asset_label || q.label}</div>
      <div class="asset-price">${priceFormatted}</div>
      <div class="chart-container"><canvas id="chart"></canvas></div>
      <div class="predict-btns">
        <button class="btn btn-green" onclick="submitDuelAnswer(${duelId}, ${idx}, 'up', ${JSON.stringify(questions).replace(/"/g, '&quot;')})">📈 Выше</button>
        <button class="btn btn-red" onclick="submitDuelAnswer(${duelId}, ${idx}, 'down', ${JSON.stringify(questions).replace(/"/g, '&quot;')})">📉 Ниже</button>
      </div>
    </div>`;

  loadChart(q.asset || q.id);
}

async function submitDuelAnswer(duelId, idx, answer, questions) {
  document.querySelectorAll('.predict-btns .btn').forEach(b => b.disabled = true);
  const data = await apiPost('/api/duel/answer', { duelId, questionIndex: idx, answer });
  if (!data.ok) { toast(data.error || 'Ошибка'); return; }
  setTimeout(() => playDuel(duelId, questions, idx + 1), 300);
}

async function openDuel(duelId) {
  const data = await api(`/api/duel/${duelId}`);
  if (!data.ok) { toast('Ошибка'); return; }
  const d = data.duel;
  const qs = data.questions;
  const isCreator = Number(currentUser.telegram_id) === Number(d.creator_id);

  if (d.is_resolved) {
    const rows = qs.map(q => {
      const myCorrect = isCreator ? q.creator_correct : q.opponent_correct;
      return `<div class="result-row ${myCorrect ? 'correct' : 'wrong'}">
        <div class="r-emoji">${q.asset_emoji}</div>
        <div class="r-info"><div class="r-label">${q.asset_label}</div></div>
        <div class="r-verdict">${myCorrect ? '✅' : '❌'}</div>
      </div>`;
    }).join('');

    let headerText;
    if (d.is_draw) headerText = '🤝 Ничья!';
    else if (d.winner_id == currentUser.telegram_id) headerText = '🏆 Ты победил(а)!';
    else headerText = '😔 Поражение';

    content.innerHTML = `
      <div class="results-header">
        <div style="font-size:48px">${d.is_draw ? '🤝' : d.winner_id == currentUser.telegram_id ? '🏆' : '😔'}</div>
        <div class="results-score">${d.creator_correct}:${d.opponent_correct}</div>
        <p style="color:var(--text2)">${headerText}</p>
      </div>
      ${rows}
      <button class="btn btn-outline" style="margin-top:16px" onclick="showTab('duels')">Назад</button>`;
    return;
  }

  const answerCol = isCreator ? 'creator_answer' : 'opponent_answer';
  const unanswered = qs.filter(q => q[answerCol] == null);

  if (unanswered.length > 0) {
    const mapped = mapDuelQuestionsForPlay(qs);
    const startIdx = duelPlayStartIndex(qs, currentUser.telegram_id, d.creator_id);
    playDuel(duelId, mapped, startIdx);
    return;
  }

  const oppCol = isCreator ? 'opponent_answer' : 'creator_answer';
  const oppUnanswered = qs.filter(q => q[oppCol] == null);
  const hasOpponent = !!d.opponent_id;

  let statusMsg;
  if (!hasOpponent) {
    statusMsg = '📨 Соперник ещё не присоединился. Отправь ему ссылку!';
  } else if (oppUnanswered.length > 0) {
    statusMsg = `⏳ Ты ответил(а) на все! Соперник — ${qs.length - oppUnanswered.length}/${qs.length}. Ждём...`;
  } else {
    statusMsg = '⏳ Оба ответили. Подсчёт результатов...';
  }

  content.innerHTML = `
    <div class="timer-block card">
      <div class="icon-big">⚔️</div>
      <p style="line-height:1.5">${statusMsg}</p>
      <button class="btn btn-outline" style="margin-top:16px" onclick="showTab('duels')">Назад</button>
    </div>`;
}

function ratingSegment() {
  return `<div class="seg-wrap">
    <div class="seg-btn ${ratingMode === 'weekly' ? 'active' : ''}" onclick="loadRating('weekly')">Неделя</div>
    <div class="seg-btn ${ratingMode === 'global' ? 'active' : ''}" onclick="loadRating('global')">Всё время</div>

async function loadRatingWeekly() {
  ratingMode = 'weekly';
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await api('/api/leaderboard/weekly');
  if (!data.ok) { content.innerHTML = '<div class="card">Ошибка загрузки</div>'; return; }

  const sunday = new Date(new Date(data.weekStart).getTime() + 7 * 24 * 3600000);
  const now = new Date();
  const diffMs = sunday - now;
  const daysLeft = Math.max(0, Math.floor(diffMs / 86400000));
  const hoursLeft = Math.max(0, Math.floor((diffMs % 86400000) / 3600000));

  let html = ratingSegment();
  html += `
    <div class="champ-hero">
      <div class="champ-pool-label">
        ${data.yourRank ? `Ты на <b>${data.yourRank}</b> месте · ${data.yourPoints} очков` : 'Сыграй раунд чтобы попасть в рейтинг'}
      </div>
      <div style="margin-top:8px;font-size:13px;color:var(--text2)">⏳ До конца недели: ${daysLeft}д ${hoursLeft}ч</div>
    </div>`;

  if (data.board.length === 0) {
    html += `<div class="card" style="text-align:center">
      <p style="color:var(--text2)">Пока никто не играл на этой неделе</p>
      <button class="btn btn-accent" style="margin-top:12px" onclick="showTab('play')">🎯 Начать игру</button>

  } else {
    html += `<div class="champ-lb">`;
    for (const e of data.board) {
      const medal = e.rank === 1 ? '🥇' : e.rank === 2 ? '🥈' : e.rank === 3 ? '🥉' : `${e.rank}.`;
      const click = e.tid ? `onclick="showUserProfile(${e.tid})" style="cursor:pointer"` : '';
      const av = e.avatar_emoji || '';
      html += `<div class="champ-lb-row${e.isMe ? ' me' : ''}" ${click}>

        ${av ? `<div class="lb-av">${av}</div>` : ''}
        <div class="champ-lb-name">${e.name}${e.title ? ` <span class="lb-title">${escapeHtml(e.title)}</span>` : ''}</div>
        <div class="champ-lb-score">${e.points} оч.</div>
      </div>`;
    }
    html += `</div>`;
  }

  html += `<div class="card" style="text-align:center;padding:12px;margin-top:16px">
    <div style="font-size:12px;color:var(--text2)">📈 Ответ: <b>+5</b> · Верный: <b>+20</b> · Победа в дуэли: <b>+30</b></div>
  </div>`;
  content.innerHTML = html;

  const rankNote = data.yourRank != null
    ? `<div class="card lb-you ${data.inTop ? 'in' : 'out'}">
         <div style="font-size:15px;font-weight:600">Твоё место: #${data.yourRank} <span style="color:var(--text2);font-weight:400">из ${data.totalPlayers || '—'}</span></div>
         ${data.yourRating != null ? `<div style="margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.35)"><span style="font-size:22px;font-weight:800;color:var(--gold)">${data.yourRating}</span> <span style="font-size:12px;font-weight:600;color:var(--text2)">очков</span></div>` : ''}
         ${!data.inTop ? '<div style="font-size:12px;color:var(--text2);margin-top:6px">Ниже — только топ-50</div>' : ''}
       </div>`
    : '';

  html += rankNote;
  html += `<div class="lb-list" role="list">${rows || '<p class="sub" style="text-align:center;padding:20px">Пока пусто — будь первым!</p>'}</div>`;

async function loadFriendsTab() {
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await api('/api/friends');
  if (!data.ok) { content.innerHTML = '<div class="card">Ошибка загрузки</div>'; return; }

  const { friends, requests } = data;
  let html = `<div class="play-header"><h2>👥 Друзья</h2>
    <div class="sub">Добавляй друзей — следи за их результатами и вызывай на дуэль!</div>
  </div>`;

  html += `<div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn btn-accent" style="flex:1" onclick="shareInvite()">📨 Пригласить в игру</button>
    <button class="btn btn-outline" style="flex:1" onclick="shareFriendLink()">👥 Добавить в друзья</button>
  </div>`;

  if (requests.length > 0) {
    html += `<div class="fr-title">📩 Запросы <span class="fr-badge">${requests.length}</span></div>`;
    requests.forEach(r => {
      html += `<div class="fr-row">
        <div class="fr-avatar">${(r.name || '?')[0].toUpperCase()}</div>
        <div class="fr-info"><div class="fr-name">${escapeHtml(r.name)}</div></div>
        <div class="fr-actions">
          <button class="fr-btn accept" onclick="acceptFriendReq(${r.telegram_id})" title="Принять">✓</button>
          <button class="fr-btn decline" onclick="removeFriend(${r.telegram_id})" title="Отклонить">✕</button>
        </div>
      </div>`;
    });
  }

  html += `<div class="fr-title">Список друзей${friends.length ? ` (${friends.length})` : ''}</div>`;

  if (friends.length === 0) {
    html += `<div class="card-sm" style="text-align:center;color:var(--text2);font-size:13px;padding:20px">
      Пока нет друзей. Пригласи кого-нибудь или сыграй дуэль!</div>`;
  } else {
    const sorted = friends.slice().sort((a, b) => (b.rating || 0) - (a.rating || 0));
    sorted.forEach((f, i) => {
      const fav = f.avatar_emoji || `${i + 1}`;
      const favStyle = f.avatar_emoji ? 'font-size:22px' : 'font-size:13px;font-weight:800';
      html += `<div class="fr-row" onclick="showUserProfile(${f.telegram_id})" style="cursor:pointer">
        <div class="fr-avatar" style="${favStyle}">${fav}</div>
        <div class="fr-info">
          <div class="fr-name">${escapeHtml(f.name)}${f.title ? ` <span style="font-size:11px;color:var(--accent)">${escapeHtml(f.title)}</span>` : ''}</div>
          <div class="fr-rating">⭐ ${f.rating || 0} очков</div>
        </div>
        <div class="fr-actions">
          <button class="fr-btn" onclick="event.stopPropagation();removeFriend(${f.telegram_id})" title="Удалить">✕</button>
        </div>
      </div>`;
    });
  }

  content.innerHTML = html;
}

  {id:'blue',label:'Сапфир',css:'box-shadow:0 0 0 3px #4a9eff,0 0 12px rgba(74,158,255,.5)'},
  {id:'green',label:'Изумруд',css:'box-shadow:0 0 0 3px #2ecc71,0 0 12px rgba(46,204,113,.5)'},
  {id:'red',label:'Рубин',css:'box-shadow:0 0 0 3px #e74c3c,0 0 12px rgba(231,76,60,.5)'},
  {id:'purple',label:'Аметист',css:'box-shadow:0 0 0 3px #9b59b6,0 0 12px rgba(155,89,182,.5)'},

function getFrameCss(frameId) {
  return FRAME_OPTIONS.find(f => f.id === frameId)?.css || '';
}

async function updateProfileField(field, value) {
  const r = await apiPost('/api/profile/update', { [field]: value });
  if (r.ok) {
    if (r.bonus_points !== undefined) toast(`Сохранено! +${r.bonus_points} бонус за профиль`);
    else toast('Сохранено!');
    loadProfile();
  } else toast(r.error || 'Ошибка');
}

function showAvatarPicker(current) {
  const grid = AVATAR_OPTIONS.map(e =>
    `<div class="av-pick${e === current ? ' active' : ''}" onclick="updateProfileField('avatar_emoji','${e}')">${e}</div>`
  ).join('');
  content.querySelector('#avatarPickerArea').innerHTML = `
    <div class="card" style="padding:12px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">Выбери аватарку</div>

      <button class="btn btn-outline" style="margin-top:10px;width:100%" onclick="updateProfileField('avatar_emoji','')">Сбросить</button>
    </div>`;
}

function showTitlePicker(current, achievements, defs) {
  const unlocked = achievements.map(a => {
    const d = defs.find(dd => dd.type === a.type);
    return d?.badge;
  }).filter(Boolean);
  const unique = [...new Set(unlocked)];
  if (unique.length === 0) { toast('Открой достижения чтобы получить титулы'); return; }
  const opts = unique.map(b =>
    `<div class="title-pick${b === current ? ' active' : ''}" onclick="updateProfileField('title','${b}')">${b}</div>`
  ).join('');
  content.querySelector('#titlePickerArea').innerHTML = `
    <div class="card" style="padding:12px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">Выбери титул</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${opts}</div>
      <button class="btn btn-outline" style="margin-top:10px;width:100%" onclick="updateProfileField('title','')">Убрать титул</button>
    </div>`;

function openTitlePicker() {
  const d = window.profileData;
  if (!d) return;
  showTitlePicker(d.user?.title || '', d.achievements || [], d.achievementDefs || []);
}

function promptBio() {
  const cur = window.profileData?.user?.bio || '';
  const val = prompt('Статус (до 60 символов):', cur);
  if (val !== null) updateProfileField('bio', val.slice(0, 60));

function togglePicker(id) {
  const el = content.querySelector('#' + id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

      ${data.leaderboardRank != null ? `<div style="font-size:13px;color:var(--text2);margin-top:8px">#${data.leaderboardRank} из ${data.totalPlayers || '—'}</div>` : ''}
    </div>

    <div class="stats-grid">
      <div class="stat-item"><div class="val">${u.total_rounds || 0}</div><div class="lbl">Раундов</div></div>
      <div class="stat-item"><div class="val">${u.total_5of5 || 0}</div><div class="lbl">5/5</div></div>
      <div class="stat-item"><div class="val">${u.best_streak || 0}</div><div class="lbl">Макс серия</div></div>
      <div class="stat-item"><div class="val">${u.duel_wins || 0}</div><div class="lbl">Побед</div></div>
      <div class="stat-item"><div class="val">${u.duel_losses || 0}</div><div class="lbl">Поражений</div></div>

function showPremiumPopup() { $('premiumPopup').classList.add('show'); }
function closePremiumPopup() { $('premiumPopup').classList.remove('show'); }

async function buyPremium() {
  const btn = document.querySelector('#premiumPopup .btn-accent');
  if (btn) { btn.disabled = true; btn.textContent = 'Загрузка...'; }

  try {
    const data = await apiPost('/api/premium/buy', {});
    if (!data.ok || !data.invoiceUrl) {
      toast(data.error || 'Ошибка создания счёта');
      return;
    }
    if (typeof tg?.openInvoice === 'function') {
      tg.openInvoice(data.invoiceUrl, (status) => {
        if (status === 'paid') {
          toast('✅ Premium активирован!');
          closePremiumPopup();
          loadProfile();
        } else if (status === 'cancelled') {
          toast('Оплата отменена');
        }
      });
    } else if (typeof tg?.openLink === 'function') {
      tg.openLink(data.invoiceUrl);
    } else {
      window.open(data.invoiceUrl, '_blank');
    }
  } catch (e) {
    toast('Ошибка сети');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Купить за 25⭐'; }
  }
}

// --- Helpers ---

function formatPrice(price, assetId) {
  if (!price) return '—';
  if (assetId === 'usd-rub') return price.toFixed(2) + ' ₽';
  if (assetId === 'eth-gas') return price.toFixed(1) + ' gwei';
  if (assetId === 'eur-usd') return '$' + price.toFixed(4);
  if (price < 0.01) return '$' + price.toFixed(6);
  if (price < 1) return '$' + price.toFixed(4);
  if (price < 100) return '$' + price.toFixed(2);
  return '$' + price.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function copyText(text) {
  navigator.clipboard?.writeText(text).then(() => toast('Скопировано!'));
}

function showConfetti() {
  const overlay = document.createElement('div');
  overlay.className = 'confetti-overlay';
  const colors = ['#ffd700','#ff6b6b','#00b894','#6c5ce7','#fd79a8','#0984e3'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 2 + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    overlay.appendChild(piece);
  }
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 4000);
}

// --- Handle deep links (duel invites) ---

function mapDuelQuestionsForPlay(rows) {
  if (!rows || !rows.length) return [];
  return rows.map(q => {
    const p = q.price_at_start != null ? q.price_at_start : q.price;
    return {
      asset: q.asset,
      asset_label: q.asset_label || q.label,
      asset_emoji: q.asset_emoji || q.emoji,
      emoji: q.asset_emoji || q.emoji,
      label: q.asset_label || q.label,
      price_at_start: p,
      price: p,
    };
  });
}

/** С какого вопроса продолжить (после обновления по той же ссылке) */
function duelPlayStartIndex(rawQuestions, userId, creatorId) {
  if (!rawQuestions?.length) return 0;
  if (creatorId == null || creatorId === '') return 0;
  const u = Number(userId);
  const c = Number(creatorId);
  const isCreator = u === c;
  if (isCreator) {
    const i = rawQuestions.findIndex(q => q.creator_answer == null);
    return i < 0 ? rawQuestions.length : i;
  }
  const i = rawQuestions.findIndex(q => q.opponent_answer == null);
  return i < 0 ? rawQuestions.length : i;
}

let _deepLinkHandled = false;
function handleDeepLink() {
  if (_deepLinkHandled) return;
  _deepLinkHandled = true;

  const start = getTelegramStartParam();
  if (start.startsWith('friend_')) {
    const friendId = start.slice(7);
    if (!friendId) return;
    setTimeout(async () => {
      showTab('friends');
      const r = await apiPost('/api/friends/add', { friendId: Number(friendId) });
      if (r.ok) {
        if (r.accepted) toast('Вы теперь друзья!');
        else if (r.already) toast('Уже в друзьях');
        else toast('Запрос дружбы отправлен!');
        loadFriendsTab();
      } else {
        toast(r.error || 'Ошибка');
      }
    }, 350);
    return;
  }
  if (!start.startsWith('duel_')) return;
  const code = start.slice(5);
  if (!code) return;
  toast('Joining duel: ' + code);
  setTimeout(async () => {
    const data = await apiPost('/api/duel/join', { code });
    console.log('[Duel join]', JSON.stringify(data));
    if (data.ok) {
      if (data.is_own) {
        showTab('duels');
        openDuel(data.duel_id);
        return;
      }
      if (data.already_opponent) toast('Продолжаем дуэль');
      showTab('duels');
      let qs = data.questions;
      if (!qs || !qs.length) {
        const full = await api(`/api/duel/${data.duel_id}`);
        if (full.ok && full.questions) qs = full.questions;
      }
      const mapped = mapDuelQuestionsForPlay(qs);
      const startIdx = duelPlayStartIndex(qs, currentUser.telegram_id, data.creator_id);
      playDuel(data.duel_id, mapped, startIdx);
    } else {
      toast(data.error || 'Не удалось войти в дуэль');
      showTab('play');
    }
  }, 500);
}

// --- Init ---

auth().then(async () => {
  const deepStart = getTelegramStartParam();

  const hasDuelLink = deepStart.startsWith('duel_');
  const hasFriendLink = deepStart.startsWith('friend_');

  if (hasDuelLink || hasFriendLink) {
    handleDeepLink();
  }

  try {
    const r = await fetch('/api/build');
    const b = await r.json();
    const el = document.getElementById('buildMarker');
    if (el && b.ok) el.textContent = 'клиент 2.3.1 · сервер v' + b.version;
  } catch (e) { /* старый сервер без /api/build */ }
});
